<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LM System | Painel de Leads</title>
  <link rel="icon" type="image/png" href="./favicon.png" />

  <style>
    :root {
      --bg: #070707;
      --card: #111;
      --text: #ececec;
      --muted: #9c9c9c;
      --gold: #d4af37;
      --line: #2b2b2b;
      --ok: #2ecc71;
      --warm: #f39c12;
      --cold: #6ea8fe;
      --danger: #7a1d1d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 14px 40px;
    }

    h1 {
      margin: 0 0 6px;
      color: var(--gold);
    }

    h2 {
      margin: 22px 0 10px;
      color: var(--gold);
      font-size: 18px;
    }

    .sub {
      margin: 0 0 14px;
      color: var(--muted);
    }

    .bar,
    .filters {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr auto auto;
    }

    .filters {
      grid-template-columns: repeat(4, minmax(140px, 220px));
      margin: 12px 0;
    }

    input,
    select,
    button,
    textarea {
      background: #0d0d0d;
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 10px;
      padding: 10px;
    }

    button {
      cursor: pointer;
    }

    .gold {
      background: var(--gold);
      color: #000;
      border: none;
      font-weight: 700;
    }

    .grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      margin-bottom: 8px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }

    .label {
      font-size: 12px;
      color: var(--muted);
    }

    .value {
      font-size: 24px;
      font-weight: 700;
      margin-top: 3px;
    }

    .pill {
      padding: 4px 8px;
      border-radius: 999px;
      display: inline-block;
      font-size: 12px;
    }

    .hot {
      background: #2b1b1b;
      color: #ff9f9f;
    }

    .warm {
      background: #2f260f;
      color: #ffd27d;
    }

    .cold {
      background: #102640;
      color: #9fc5ff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }

    th,
    td {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      color: var(--gold);
      font-weight: 700;
    }

    .actions {
      display: grid;
      gap: 8px;
    }

    .wa {
      background: #1f8f48;
      border: none;
      color: white;
      text-decoration: none;
      padding: 8px 10px;
      border-radius: 8px;
      display: inline-block;
      text-align: center;
    }

    .lead-overdue {
      border: 1px solid var(--danger) !important;
      background: #1a0d0d;
    }

    .lead-today {
      border: 1px solid var(--gold) !important;
    }

    .commercial {
      display: grid;
      gap: 6px;
      min-width: 220px;
    }

    .commercial textarea,
    .commercial input {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
    }

    #feedback {
      min-height: 20px;
      color: var(--muted);
      margin: 8px 0;
    }

    @media (max-width: 900px) {
      .bar,
      .filters {
        grid-template-columns: 1fr;
      }

      table,
      thead,
      tbody,
      th,
      td,
      tr {
        display: block;
      }

      thead {
        display: none;
      }

      tr {
        border: 1px solid var(--line);
        border-radius: 12px;
        margin-bottom: 10px;
        padding: 6px;
        background: var(--card);
      }

      td {
        border: none;
        padding: 6px;
      }

      td::before {
        content: attr(data-label);
        display: block;
        color: var(--gold);
        font-size: 12px;
        margin-bottom: 2px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <h1>Painel Interno de Leads</h1>
    <p class="sub">Visualização e follow-up comercial (admin).</p>

    <section class="bar">
      <input id="adminToken" type="password" placeholder="ADMIN token" />
      <button class="gold" id="saveToken">Salvar token</button>
      <button id="loadLeads">Carregar painel</button>
    </section>

    <section class="filters">
      <select id="periodFilter">
        <option value="all">Todos</option>
        <option value="today">Hoje</option>
        <option value="week">Esta semana</option>
        <option value="month">Este mês</option>
      </select>

      <select id="statusFilter">
        <option value="">Todos status</option>
      </select>

      <select id="planFilter">
        <option value="">Todos planos</option>
      </select>

      <select id="followUpFilter">
        <option value="all">Retornos pendentes: Todos</option>
        <option value="today">Hoje</option>
        <option value="overdue">Atrasados</option>
        <option value="next7">Próximos 7 dias</option>
      </select>
    </section>

    <p id="feedback"></p>

    <h2>Visão comercial</h2>
    <section id="mainMetrics" class="grid"></section>

    <h2>Pipeline</h2>
    <section id="pipelineMetrics" class="grid"></section>

    <h2>Qualidade do lead</h2>
    <section id="qualityMetrics" class="grid"></section>

    <h2>Planos recomendados</h2>
    <section id="plansMetrics" class="grid"></section>

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>WhatsApp</th>
          <th>Objetivo</th>
          <th>LM Score</th>
          <th>Classificação</th>
          <th>Plano</th>
          <th>Prioridade</th>
          <th>Gargalo</th>
          <th>Data</th>
          <th>Status</th>
          <th>Comercial</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </main>

  <script>
    const API_BASE = "https://lm-system-api.lucasmoreno115.workers.dev";

    const statusList = ["NEW", "CONTACTED", "NEGOTIATION", "CLOSED", "LOST"];
    const $ = (id) => document.getElementById(id);
    const feedback = $("feedback");

    let allLeads = [];
    let currentMetrics = null;

    const tokenInput = $("adminToken");
    tokenInput.value = localStorage.getItem("lm_admin_token") || "";

    $("saveToken").onclick = () => {
      localStorage.setItem("lm_admin_token", tokenInput.value.trim());
      feedback.textContent = "Token salvo no navegador.";
    };

    $("loadLeads").onclick = loadDashboard;
    $("statusFilter").onchange = render;
    $("planFilter").onchange = render;
    $("periodFilter").onchange = loadDashboard;
    $("followUpFilter").onchange = render;

    async function loadDashboard() {
      const token = tokenInput.value.trim();

      if (!token) {
        feedback.textContent = "Informe o token admin.";
        return;
      }

      feedback.textContent = "Carregando métricas e leads...";

      try {
        await Promise.all([
          fetchLeads(token),
          fetchMetrics(token)
        ]);

        render();
        feedback.textContent = `${allLeads.length} lead(s) carregado(s).`;
      } catch (error) {
        feedback.textContent = error.message || "Erro ao carregar painel.";
      }
    }

    async function fetchLeads(token) {
      const res = await fetch(`${API_BASE}/api/admin/leads`, {
        headers: {
          "x-admin-token": token
        }
      });

      const json = await res.json();

      if (!res.ok || !json.ok) {
        throw new Error(json?.error?.message || "Erro ao carregar leads.");
      }

      allLeads = Array.isArray(json.data) ? json.data : [];
      hydrateFilters(allLeads);
    }

    async function fetchMetrics(token) {
      const period = $("periodFilter").value || "all";

      const res = await fetch(`${API_BASE}/api/admin/metrics?period=${period}`, {
        headers: {
          "x-admin-token": token
        }
      });

      const json = await res.json();

      if (!res.ok || !json.ok) {
        throw new Error(json?.error?.message || "Erro ao carregar métricas.");
      }

      currentMetrics = json.data;
      renderMetrics();
    }

    function hydrateFilters(leads) {
      $("statusFilter").innerHTML =
        '<option value="">Todos status</option>' +
        statusList.map((status) => `<option value="${status}">${status}</option>`).join("");

      const plans = [
        ...new Set(
          leads
            .map((lead) => lead.recommendedOffer || lead.recommendedPlan)
            .filter(Boolean)
        )
      ];

      $("planFilter").innerHTML =
        '<option value="">Todos planos</option>' +
        plans.map((plan) => `<option value="${esc(plan)}">${esc(plan)}</option>`).join("");
    }

    function render() {
      const status = $("statusFilter").value;
      const plan = $("planFilter").value;
      const period = $("periodFilter").value;
      const followUp = $("followUpFilter").value;

      const rows = allLeads.filter((lead) =>
        (!status || lead.status === status) &&
        (!plan || (lead.recommendedOffer || lead.recommendedPlan) === plan) &&
        inPeriod(lead.createdAt, period) &&
        matchesFollowUpFilter(lead, followUp)
      );

      $("tbody").innerHTML = rows.map(leadRow).join("");
    }

    function inPeriod(value, period) {
      if (period === "all") return true;

      const date = new Date(value);
      const now = new Date();

      if (isNaN(date)) return false;

      if (period === "today") {
        return date.toDateString() === now.toDateString();
      }

      if (period === "month") {
        return (
          date.getMonth() === now.getMonth() &&
          date.getFullYear() === now.getFullYear()
        );
      }

      if (period === "week") {
        const day = now.getDay();
        const diff = day === 0 ? 6 : day - 1;
        const start = new Date(now.getFullYear(), now.getMonth(), now.getDate() - diff);
        start.setHours(0, 0, 0, 0);
        return date >= start && date <= now;
      }

      return true;
    }

    function matchesFollowUpFilter(lead, filter) {
      if (filter === "all") return true;

      const date = parseFollowUpDate(lead.followUpAt);
      if (!date) return false;

      const now = new Date();
      const nextSevenDays = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);

      if (filter === "today") {
        return date.toDateString() === now.toDateString();
      }

      if (filter === "overdue") {
        return date < now && !["CLOSED", "LOST"].includes(lead.status);
      }

      if (filter === "next7") {
        return date >= now && date <= nextSevenDays;
      }

      return true;
    }

    function renderMetrics() {
      if (!currentMetrics) return;

      const overview = currentMetrics.overview || {};
      const pipeline = currentMetrics.pipeline || {};
      const revenue = currentMetrics.revenue || {};

      $("mainMetrics").innerHTML = [
        card("Leads hoje", overview.leadsToday || 0),
        card("Leads no mês", overview.leadsThisMonth || 0),
        card("Em negociação", overview.negotiationThisMonth || 0),
        card("Fechados no mês", overview.closedThisMonth || 0),
        card("Receita estimada mês", money(revenue.closedRevenueThisMonth || 0)),
        card("Pipeline estimado", money(revenue.estimatedPipelineValue || 0))
      ].join("");

      $("pipelineMetrics").innerHTML = statusList
        .map((status) => card(status, pipeline[status] || 0))
        .join("");

      $("qualityMetrics").innerHTML = (currentMetrics.leadQuality || [])
        .map((quality) => `
          <article class="card">
            <div class="label">
              <span class="pill ${String(quality.bucket).toLowerCase()}">${esc(quality.bucket)}</span>
            </div>
            <div class="value">${quality.count}</div>
            <div class="label">${quality.percentage}%</div>
          </article>
        `)
        .join("");

      $("plansMetrics").innerHTML = (currentMetrics.recommendedPlans || [])
        .map((item) => `
          <article class="card">
            <div class="label">${esc(item.plan)}</div>
            <div class="value">${item.count}</div>
            <div class="label">${item.percentage}%</div>
          </article>
        `)
        .join("");
    }

    function card(label, value) {
      return `
        <article class="card">
          <div class="label">${label}</div>
          <div class="value">${value}</div>
        </article>
      `;
    }

    function money(value) {
      return new Intl.NumberFormat("pt-BR", {
        style: "currency",
        currency: "BRL"
      }).format(value || 0);
    }

    function leadRow(lead) {
      const number = normalizePhone(lead.whatsapp || "");
      const gargalo = lead.mainBottleneck || "não informado";

      const extra = lead.nextAction
        ? ` Anotei aqui que o próximo passo seria: ${lead.nextAction}.`
        : "";

      const msg =
        `Olá, ${lead.nome || ""}. Vi seu diagnóstico no Método LM e seu principal ponto hoje parece ser ${gargalo}. ` +
        `Posso te explicar rapidamente qual seria o melhor próximo passo para o seu caso?${extra}`;

      const waUrl = `https://wa.me/${number}?text=${encodeURIComponent(msg.slice(0, 500))}`;

      const statusSelect = `
        <select onchange="updateStatus('${lead.leadId}', this.value)">
          ${statusList.map((status) =>
            `<option value="${status}" ${lead.status === status ? "selected" : ""}>${status}</option>`
          ).join("")}
        </select>
      `;

      const highlight = getLeadHighlightClass(lead);

      return `
        <tr class="${highlight}">
          <td data-label="Nome">${esc(lead.nome)}</td>
          <td data-label="WhatsApp">${esc(lead.whatsapp || "")}</td>
          <td data-label="Objetivo">${esc(lead.objetivo || "")}</td>
          <td data-label="LM Score">${lead.lmScore ?? "-"}</td>
          <td data-label="Classificação">${esc(lead.classification || "")}</td>
          <td data-label="Plano">${esc(lead.recommendedOffer || lead.recommendedPlan || "-")}</td>
          <td data-label="Prioridade">${esc(lead.leadPriority || "-")}</td>
          <td data-label="Gargalo">${esc(gargalo)}</td>
          <td data-label="Data">${fmtDate(lead.createdAt)}</td>
          <td data-label="Status">${statusSelect}</td>
          <td data-label="Comercial">
            <div class="commercial">
              <label>
                Observação
                <textarea id="notes-${lead.leadId}" rows="2" maxlength="1000">${esc(lead.notes || "")}</textarea>
              </label>

              <label>
                Próxima ação
                <input id="next-${lead.leadId}" type="text" maxlength="200" value="${esc(lead.nextAction || "")}" />
              </label>

              <label>
                Retorno
                <input id="fup-${lead.leadId}" type="datetime-local" value="${toDatetimeLocal(lead.followUpAt)}" />
              </label>

              <button onclick="saveCommercial('${lead.leadId}')">
                Salvar comercial
              </button>
            </div>
          </td>
          <td data-label="Ações" class="actions">
            <a class="wa" target="_blank" rel="noopener" href="${waUrl}">
              Chamar no WhatsApp
            </a>
          </td>
        </tr>
      `;
    }

    async function updateStatus(leadId, status) {
      const token = tokenInput.value.trim();

      const res = await fetch(`${API_BASE}/api/admin/leads/${leadId}/status`, {
        method: "PATCH",
        headers: {
          "Content-Type": "application/json",
          "x-admin-token": token
        },
        body: JSON.stringify({ status })
      });

      const json = await res.json();

      if (!res.ok || !json.ok) {
        feedback.textContent = json?.error?.message || "Erro ao atualizar status.";
        return;
      }

      const lead = allLeads.find((item) => item.leadId === leadId);
      if (lead) lead.status = status;

      feedback.textContent = `Status atualizado para ${status}.`;

      await fetchMetrics(token);
      render();
    }

    async function saveCommercial(leadId) {
      const token = tokenInput.value.trim();

      const notes = $("notes-" + leadId)?.value || "";
      const nextAction = $("next-" + leadId)?.value || "";
      const followUpAt = $("fup-" + leadId)?.value || "";

      const res = await fetch(`${API_BASE}/api/admin/leads/${leadId}/commercial`, {
        method: "PATCH",
        headers: {
          "Content-Type": "application/json",
          "x-admin-token": token
        },
        body: JSON.stringify({
          notes,
          nextAction,
          followUpAt
        })
      });

      const json = await res.json();

      if (!res.ok || !json.ok) {
        feedback.textContent = json?.error?.message || "Erro ao salvar dados comerciais.";
        return;
      }

      const lead = allLeads.find((item) => item.leadId === leadId);
      if (lead) Object.assign(lead, json.data);

      feedback.textContent = "Dados comerciais salvos.";

      await fetchMetrics(token);
      render();
    }

    window.updateStatus = updateStatus;
    window.saveCommercial = saveCommercial;

    function parseFollowUpDate(value) {
      if (!value) return null;
      const date = new Date(value);
      return isNaN(date) ? null : date;
    }

    function getLeadHighlightClass(lead) {
      if (["CLOSED", "LOST"].includes(lead.status)) return "";

      const date = parseFollowUpDate(lead.followUpAt);
      if (!date) return "";

      const now = new Date();

      if (date < now) return "lead-overdue";
      if (date.toDateString() === now.toDateString()) return "lead-today";

      return "";
    }

    function toDatetimeLocal(value) {
      const date = parseFollowUpDate(value);
      if (!date) return "";

      const pad = (number) => String(number).padStart(2, "0");

      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function normalizePhone(raw) {
      let digits = String(raw || "").replace(/\D/g, "");

      if (!digits.startsWith("55")) {
        digits = `55${digits}`;
      }

      return digits;
    }

    function fmtDate(value) {
      if (!value) return "-";

      const date = new Date(value);

      return isNaN(date) ? value : date.toLocaleString("pt-BR");
    }

    function esc(value) {
      return String(value ?? "").replace(/[&<>'"]/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#39;",
        '"': "&quot;"
      }[char]));
    }
  </script>
</body>
</html>
