<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LM System | Painel de Leads</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <style>
      :root { --bg:#070707; --card:#111; --text:#ececec; --muted:#9c9c9c; --gold:#d4af37; --line:#2b2b2b; --ok:#2ecc71; --warm:#f39c12; --cold:#6ea8fe; }
      *{box-sizing:border-box} body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text)} .wrap{max-width:1200px;margin:0 auto;padding:20px 14px 40px}
      h1{margin:0 0 6px;color:var(--gold)} h2{margin:22px 0 10px;color:var(--gold);font-size:18px} .sub{margin:0 0 14px;color:var(--muted)}
      .bar,.filters{display:grid;gap:10px;grid-template-columns:1fr auto auto} .filters{grid-template-columns:repeat(3,minmax(140px,220px));margin:12px 0}
      input,select,button{background:#0d0d0d;border:1px solid var(--line);color:var(--text);border-radius:10px;padding:10px} button{cursor:pointer}
      .gold{background:var(--gold);color:#000;border:none;font-weight:700}
      .grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin-bottom:8px}
      .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px}.label{font-size:12px;color:var(--muted)}.value{font-size:24px;font-weight:700;margin-top:3px}
      .pill{padding:4px 8px;border-radius:999px;display:inline-block;font-size:12px}.hot{background:#2b1b1b;color:#ff9f9f}.warm{background:#2f260f;color:#ffd27d}.cold{background:#102640;color:#9fc5ff}
      table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden} th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;font-size:14px;vertical-align:top} th{color:var(--gold);font-weight:700}
      .actions{display:grid;gap:8px}.wa{background:#1f8f48;border:none;color:white;text-decoration:none;padding:8px 10px;border-radius:8px;display:inline-block;text-align:center}
      #feedback{min-height:20px;color:var(--muted);margin:8px 0}
      @media (max-width:900px){.bar{grid-template-columns:1fr}.filters{grid-template-columns:1fr}table,thead,tbody,th,td,tr{display:block}thead{display:none}tr{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;padding:6px;background:var(--card)}td{border:none;padding:6px}td::before{content:attr(data-label);display:block;color:var(--gold);font-size:12px;margin-bottom:2px}}
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Painel Interno de Leads</h1><p class="sub">Visualização e follow-up comercial (admin).</p>
      <section class="bar"><input id="adminToken" type="password" placeholder="ADMIN token" /><button class="gold" id="saveToken">Salvar token</button><button id="loadLeads">Carregar painel</button></section>
      <section class="filters"><select id="periodFilter"><option value="all">Todos</option><option value="today">Hoje</option><option value="week">Esta semana</option><option value="month">Este mês</option></select><select id="statusFilter"><option value="">Todos status</option></select><select id="planFilter"><option value="">Todos planos</option></select></section>
      <p id="feedback"></p>

      <h2>Visão comercial</h2><section id="mainMetrics" class="grid"></section>
      <h2>Pipeline</h2><section id="pipelineMetrics" class="grid"></section>
      <h2>Qualidade do lead</h2><section id="qualityMetrics" class="grid"></section>
      <h2>Planos recomendados</h2><section id="plansMetrics" class="grid"></section>

      <table><thead><tr><th>Nome</th><th>WhatsApp</th><th>Objetivo</th><th>LM Score</th><th>Classificação</th><th>Plano</th><th>Prioridade</th><th>Gargalo</th><th>Data</th><th>Status</th><th>Ações</th></tr></thead><tbody id="tbody"></tbody></table>
    </main>
    <script>
      const statusList=["NEW","CONTACTED","NEGOTIATION","CLOSED","LOST"]; const $=(id)=>document.getElementById(id); const feedback=$("feedback");
      let allLeads=[]; let currentMetrics=null;
      const tokenInput=$("adminToken"); tokenInput.value=localStorage.getItem("lm_admin_token")||"";
      $("saveToken").onclick=()=>{localStorage.setItem("lm_admin_token",tokenInput.value.trim());feedback.textContent="Token salvo no navegador."};
      $("loadLeads").onclick=loadDashboard; $("statusFilter").onchange=render; $("planFilter").onchange=render; $("periodFilter").onchange=loadDashboard;

      async function loadDashboard(){const token=tokenInput.value.trim(); if(!token){feedback.textContent="Informe o token admin.";return;} feedback.textContent="Carregando métricas e leads...";
        try { await Promise.all([fetchLeads(token),fetchMetrics(token)]); render(); feedback.textContent=`${allLeads.length} lead(s) carregado(s).`; } catch(e){ feedback.textContent=e.message||"Erro ao carregar painel."; }}

      async function fetchLeads(token){const res=await fetch("/api/admin/leads",{headers:{"x-admin-token":token}});const json=await res.json(); if(!res.ok||!json.ok) throw new Error(json?.error?.message||"Erro ao carregar leads."); allLeads=Array.isArray(json.data)?json.data:[]; hydrateFilters(allLeads);}
      async function fetchMetrics(token){const period=$("periodFilter").value||"all";const res=await fetch(`/api/admin/metrics?period=${period}`,{headers:{"x-admin-token":token}});const json=await res.json(); if(!res.ok||!json.ok) throw new Error(json?.error?.message||"Erro ao carregar métricas."); currentMetrics=json.data; renderMetrics();}

      function hydrateFilters(leads){$("statusFilter").innerHTML='<option value="">Todos status</option>'+statusList.map(s=>`<option value="${s}">${s}</option>`).join(""); const plans=[...new Set(leads.map(l=>l.recommendedOffer||l.recommendedPlan).filter(Boolean))]; $("planFilter").innerHTML='<option value="">Todos planos</option>'+plans.map(p=>`<option value="${p}">${p}</option>`).join("");}
      function render(){const s=$("statusFilter").value,p=$("planFilter").value,period=$("periodFilter").value; const rows=allLeads.filter(l=>(!s||l.status===s)&&(!p||(l.recommendedOffer||l.recommendedPlan)===p)&&inPeriod(l.createdAt,period)); $("tbody").innerHTML=rows.map(leadRow).join("");}
      function inPeriod(v,period){if(period==="all") return true; const d=new Date(v),n=new Date(); if(isNaN(d)) return false; if(period==="today") return d.toDateString()===n.toDateString(); if(period==="month") return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear(); if(period==="week"){const day=n.getDay(); const diff=day===0?6:day-1; const start=new Date(n.getFullYear(),n.getMonth(),n.getDate()-diff); start.setHours(0,0,0,0); return d>=start&&d<=n;} return true;}

      function renderMetrics(){ if(!currentMetrics) return; const o=currentMetrics.overview||{}, p=currentMetrics.pipeline||{}, r=currentMetrics.revenue||{};
        $("mainMetrics").innerHTML=[card("Leads hoje",o.leadsToday||0),card("Leads no mês",o.leadsThisMonth||0),card("Em negociação",o.negotiationThisMonth||0),card("Fechados no mês",o.closedThisMonth||0),card("Receita estimada mês",money(r.closedRevenueThisMonth||0)),card("Pipeline estimado",money(r.estimatedPipelineValue||0))].join("");
        $("pipelineMetrics").innerHTML=statusList.map(s=>card(s,p[s]||0)).join("");
        $("qualityMetrics").innerHTML=(currentMetrics.leadQuality||[]).map(q=>`<article class="card"><div class="label"><span class="pill ${q.bucket.toLowerCase()}">${q.bucket}</span></div><div class="value">${q.count}</div><div class="label">${q.percentage}%</div></article>`).join("");
        $("plansMetrics").innerHTML=(currentMetrics.recommendedPlans||[]).map(x=>`<article class="card"><div class="label">${esc(x.plan)}</div><div class="value">${x.count}</div><div class="label">${x.percentage}%</div></article>`).join("");
      }
      const card=(label,value)=>`<article class="card"><div class="label">${label}</div><div class="value">${value}</div></article>`; const money=(v)=>new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v||0);

      function leadRow(lead){const number=normalizePhone(lead.whatsapp||""); const gargalo=lead.mainBottleneck||"não informado"; const msg=`Olá, ${lead.nome||""}. Vi seu diagnóstico no Método LM e seu principal ponto hoje parece ser ${gargalo}. Posso te explicar rapidamente qual seria o melhor próximo passo para o seu caso?`; const waUrl=`https://wa.me/${number}?text=${encodeURIComponent(msg)}`; const statusSelect=`<select onchange="updateStatus('${lead.leadId}', this.value)">${statusList.map(s=>`<option value="${s}" ${lead.status===s?"selected":""}>${s}</option>`).join("")}</select>`; return `<tr><td data-label="Nome">${esc(lead.nome)}</td><td data-label="WhatsApp">${esc(lead.whatsapp||"")}</td><td data-label="Objetivo">${esc(lead.objetivo||"")}</td><td data-label="LM Score">${lead.lmScore??"-"}</td><td data-label="Classificação">${esc(lead.classification||"")}</td><td data-label="Plano">${esc(lead.recommendedOffer||lead.recommendedPlan||"-")}</td><td data-label="Prioridade">${esc(lead.leadPriority||"-")}</td><td data-label="Gargalo">${esc(gargalo)}</td><td data-label="Data">${fmtDate(lead.createdAt)}</td><td data-label="Status">${statusSelect}</td><td data-label="Ações" class="actions"><a class="wa" target="_blank" href="${waUrl}">Chamar no WhatsApp</a></td></tr>`;}

      async function updateStatus(leadId,status){const token=tokenInput.value.trim(); const res=await fetch(`/api/admin/leads/${leadId}/status`,{method:"PATCH",headers:{"Content-Type":"application/json","x-admin-token":token},body:JSON.stringify({status})}); const json=await res.json(); if(!res.ok||!json.ok) return feedback.textContent=json?.error?.message||"Erro ao atualizar status"; const lead=allLeads.find(l=>l.leadId===leadId); if(lead) lead.status=status; feedback.textContent=`Status atualizado para ${status}.`; loadDashboard();}
      window.updateStatus=updateStatus;
      function normalizePhone(raw){let digits=String(raw||"").replace(/\D/g,""); if(!digits.startsWith("55")) digits=`55${digits}`; return digits;}
      function fmtDate(v){if(!v) return "-"; const d=new Date(v); return isNaN(d)?v:d.toLocaleString("pt-BR");}
      function esc(v){return String(v).replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));}
    </script>
  </body>
</html>
