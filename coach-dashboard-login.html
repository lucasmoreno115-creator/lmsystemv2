<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LM System | Acesso restrito</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="stylesheet" href="./style.css" />
    <style>
      .admin-login-card { max-width: 460px; margin: 48px auto 0; }
      .admin-login-card h1 { margin: 8px 0 4px; }
      .admin-login-subtitle { margin: 0 0 16px; color: var(--muted); }
      .admin-login-error { min-height: 20px; margin: 10px 0 0; color: var(--danger); }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="card admin-login-card">
        <p class="eyebrow">Coach View</p>
        <h1>Acesso restrito</h1>
        <p class="admin-login-subtitle">Área interna de uso operacional</p>

        <form id="admin-login-form" novalidate>
          <label>Senha de acesso
            <input id="dashboard-password" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit">Entrar</button>
          <p id="admin-login-error" class="admin-login-error" role="alert" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script type="module" src="./src/admin/admin-login-entry.js"></script>
  </body>
</html>
